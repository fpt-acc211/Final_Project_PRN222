name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - run: dotnet restore QuizManagementSystem.slnx
      - run: dotnet build QuizManagementSystem.slnx -c Release --no-restore
      - run: dotnet test QuizManagementSystem.slnx -c Release --no-build